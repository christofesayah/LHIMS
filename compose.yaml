services:
  db:
    image: postgis/postgis:16-3.4
    container_name: lhims-db
    environment:
      POSTGRES_DB: ${DB_NAME:-lhims_db}
      POSTGRES_USER: ${DB_USER:-lhims_user}
      POSTGRES_PASSWORD: ${DB_PASS:-lhims_pass}
    ports:
      - "${DB_PORT:-5400}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lhims_user} -d ${DB_NAME:-lhims_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
