# ===================================================================
# LHIMS API Application-wide Properties
# ===================================================================

# ----------------------------------------
# CORE
# ----------------------------------------
server.port=8080

# ----------------------------------------
# DATABASE
# ----------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:lhims_db}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASS:password}
spring.jpa.hibernate.ddl-auto=validate

# ----------------------------------------
# FLYWAY
# ----------------------------------------
spring.flyway.enabled=true
spring.flyway.out-of-order=true
spring.flyway.repair-on-migrate=true

# ----------------------------------------
# SECURITY & INTEGRATIONS
# ----------------------------------------
app.jwt.secret=${APP_JWT_SECRET:default-super-secret-key-for-lhims-that-is-long-enough-for-hs256}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:86400} # 24 hours
analytics.base-url=${ANALYTICS_BASE_URL:http://analytics:8000}